<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button onclick="analisar()">Filtrar números Cabalísticos</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  function analisar() {
    let mensagem = "";
    for (contador = 1; contador < 31; contador++) {
      if (
        contador == 3 ||
        contador == 4 ||
        contador == 7 ||
        contador == 10 ||
        contador == 12
      ) {
      } else {
        mensagem += `${contador}<br>`;
      }
    }
    resposta.innerHTML = `${mensagem}`;
  }
</script>
