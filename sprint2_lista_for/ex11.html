<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <select id="num_tabuada">
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option></select
    ><br />
    insira o número até onde a tabuada vai:
    <input type="text" id="inp_num" /><br />
    <button onclick="analisar()">S2 Pares</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  function analisar() {
    let maximo = Number(inp_num.value);
    let tabuada = Number(num_tabuada.value);
    let mensagem = "";
    for (contador = 0; contador <= maximo; contador++) {
      if((contador * tabuada) % 2 == 0){
      mensagem += `<span style="color:red">${tabuada} X ${contador} = ${contador * tabuada}</span><br>`;
    } else{
      mensagem += `<span style="color:blue">${tabuada} X ${contador} = ${contador * tabuada}</span><br>`;
      }
      resposta.innerHTML = `${mensagem}`;
    }
  }
</script>
