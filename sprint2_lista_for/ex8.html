<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    insira um numero <input type="text" id="inp_num" />
    <button onclick="analisar()">Adoro múltiplos de 5</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  function analisar() {
    let num = Number(inp_num.value);
    let mensagem = "";
    if (num < 20 || num > 100) {
      alert("Insira um número válido");
    } else {
      for (contador = 0 ; contador < num; contador++) {
        if (contador % 5 == 0) {
          mensagem += `${contador}<br>`;
        }
      }
    }
    resposta.innerHTML = `${mensagem}`;
  }
</script>
