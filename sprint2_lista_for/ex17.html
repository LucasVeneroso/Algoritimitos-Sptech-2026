<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    insira a quantidade de elefantes: <input type="text" id="inp_numElefantes"><br>
    <button onclick="iniciar()">Atazanar a medium</button>
    <div id="resposta"></div>
</body>
</html>
<script>
    
    function iniciar(){
        let numElefantes = Number(inp_numElefantes.value);
        let frase = `incomodam,`
        let repetirFrase = `incomodam,`
        for(contador = 2; contador <= numElefantes; contador++){
            resposta.innerHTML += `1 elefante incomoda muita gente! <br>
            ${contador} elefantes, incomodam,${repetirFrase}muito mais!<br>`
            repetirFrase += frase 
        }
    }
</script>
