<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Questão 1</title>
</head>
<body>
   <h2>Questão 1</h2>

   <span>Quantidade de Energia Consumida (kWh): </span>
   <input type="text" id="input_kwh"> <br>

   <button onclick="calcular()">Calcular Despesa</button>

   <div id="div_mensagem"></div>
</body>
</html>

<script>

   function calcular() {

      /* Faça sua lógica aqui! Não altere o HTML. */
      let qtdEnergia = Number(input_kwh.value);
      let valorEnergia = 0
      if (qtdEnergia < 100) {
         valorEnergia = (0.95 * qtdEnergia);
      } else {
         valorEnergia = (1.5 * qtdEnergia)
      }
      div_mensagem.innerHTML = `Com o consumo de ${qtdEnergia} kWh, a conta de energia totaliza R$${valorEnergia}`
   }

</script>
