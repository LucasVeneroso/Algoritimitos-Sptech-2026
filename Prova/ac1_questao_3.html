<!DOCTYPE html>
<html lang="pt-BR">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Questão 3</title>
</head>
<body>
   <h2>Questão 3</h2>
   
   <span>Quantidade de MB de internet consumida no plano</span>
   <input type="text" id="input_mb"> <br>

   <span>Indicação se há telefone vinculado ao plano</span>
   <input type="text" id="input_indicacao"> <br>

   <button onclick="calcular()">Calcular Despesa</button>

   <div id="div_mensagem"></div>
</body>
</html>

<script>

   function calcular() {

      /* Faça sua lógica aqui! Não altere o HTML. */
      let qtdMb = Number(input_mb.value);
      let indicacao = input_indicacao.value;
      let valorInternet = 0;
      let valorComTelefone = 0
      if (qtdMb <= 200){
         valorInternet = (40 + qtdMb);
      } else {
         valorInternet = (qtdMb - 40);
      }
      if(indicacao == 'sim') {
         valorComTelefone = valorInternet + (valorInternet * 0.2)
         div_mensagem.innerHTML = `Com o consumo de ${qtdMb} MB de internet, o valor base do plano de internet é R$${valorInternet} , totalizando R$${valorComTelefone} com telefone.`
      } else {
         div_mensagem.innerHTML = `Com o consumo de ${qtdMb} MB de internet, o valor do plano de internet totaliza R$${valorInternet}`

      }
   }

</script>
