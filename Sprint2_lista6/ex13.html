<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    insira os filmes que você gosta, comece pelo seu favorito:
    <input type="text" id="inp_filmes" oninput="exibir()" />
    <button onclick="adicionar()">Cadastrar filme</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  let lista = [];
  function adicionar() {
    let filme = inp_filmes.value;
    lista.push(filme);
  }
  function exibir() {
    if (lista.length < 2){      
      resposta.innerHTML = ` Seu filme favorito: ${lista[0]} <br>
      Seu 3º filme favorito: Ainda não existe <br> Total de filmes cadastrados: ${lista.length}`;
    } else {
    resposta.innerHTML = ` Seu filme favorito: ${lista[0]} <br>
                            Seu 3º filme favorito ${lista[2]} <br> Total de filmes cadastrados: ${lista.length}`;
    }
  }
</script>
