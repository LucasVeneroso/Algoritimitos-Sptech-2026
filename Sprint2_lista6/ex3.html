<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    inisra uma frase: <input type="text" id="inp_frases" /><br />
    inisra uma palavra: <input type="text" id="inp_palavra" /><br />
    <button onclick="analisar()">Analisar Frase</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  function analisar() {
    let frase = inp_frases.value;
    let palavra = inp_palavra.value;
    let primeiraPalavra = frase.startsWith(palavra);
    let ultimaPalavra = frase.endsWith(palavra);
    let mensagem = ``;

    if (primeiraPalavra  && ultimaPalavra) {
      mensagem = `A frase começa e termina com ${palavra}`;
    } else  if (primeiraPalavra){
        mensagem = `A frase começa com ${palavra}`;
    } else if (ultimaPalavra){
        mensagem = `A frase termina com ${palavra}`;
    } else {
        mensagem = `A frase não começa e nem termina com ${palavra}`;
    }

    resposta.innerHTML = `${mensagem}`
  }
</script>
