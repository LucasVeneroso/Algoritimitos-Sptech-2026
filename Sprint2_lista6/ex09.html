<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Insira uma fruta <input type="text" id="inp_pesquisaFruta">
    <button onclick="analisar()">Pesquisar</button>
    <div id="resposta"></div>
</body>
</html>
<script>
    let frutas = ['banana', 'maça', 'morango']
    function analisar(){
        let pesquisaFruta = inp_pesquisaFruta.value;
        if (frutas.includes(pesquisaFruta)){
            resposta.innerHTML = `A fruta ${pesquisaFruta} existe na lista.`
        } else {
            resposta.innerHTML = `Não existe a fruta ${pesquisaFruta} na lista.`
        }
    }
</script>
