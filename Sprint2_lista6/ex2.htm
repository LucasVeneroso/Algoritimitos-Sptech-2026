<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    insira uma frase <input type="text" id="inp_frase"><br>
    <button onclick="analisar()">Analisar Frase</button>
    <div id="resposta"></div>
</body>
</html>
<script>
    function analisar(){
        let frase = inp_frase.value
        let mensagem = ``;
        if (frase.includes("teste", "abc", "spam") == true){
            mensagem = `<p style="color: red">Frase inválida!!</p>`
        } else {
            mensagem = `<p style="color: green">Frase Válida!</p>`
        }
        resposta.innerHTML = `${mensagem}`
    }
</script>
