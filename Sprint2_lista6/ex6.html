<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    insira uma frase:
    <input type="text" id="inp_frase" oninput="analisar()" /><br />
    Insira o número da letra que você quer
    <input type="text" id="inp_num" oninput="analisar()" /><br />
    <div id="resposta"></div>
  </body>
</html>
<script>
  function analisar() {
    let numero = Number(inp_num.value);
    let frase = inp_frase.value;
    let primeiraLetra = frase[0]
    let letraSelecionada = frase[numero - 1]
    let umtimaLetra = frase[frase.length + 1]
    resposta.innerHTML = `  A primeira letra é: ${primeiraLetra}  <br>
    A XXª letra é: ${letraSelecionada} <br>
    A última letra é: ${umtimaLetra} <br>`;
  }
</script>
