<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    insira a nota: <input type="text" id="inp_nota"><br>
    insira a frequência: <input type="text" id="inp_freque"><br>
    <button onclick="analisar()">Analisar aluno</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  function analisar() {
    let nota = Number(inp_nota.value);
    let frequencia = Number(inp_freque.value);
    let mensagemNota = "";
    let mensagemFreque = "";
    if (nota < 0 || nota > 10) {
      alert("Onde já se viu nota <0 ou >10?!");
      mensagemNota = "";
    } else if (frequencia < 0 || frequencia > 100) {
      alert("Onde já se viu frequência <0 ou >100?!");
      mensagemFreque = "";
    } else if (nota >= 0 && nota < 6) {
      mensagemNota = "Aluno ficou abaixo da média";
    } else if (nota >= 6 && nota <= 8) {
      mensagemNota = "Aluno ficou na média";
    } else if (nota > 8) {
      mensagemNota = "Aluno acima da média";
    } 
       
    if (frequencia >= 75) {
      mensagemFreque = "Aluno aprovado por frequência";
    } else {
      mensagemFreque = "Aluno reprovado por frequência";
    }
    resposta.innerHTML = `${mensagemNota} <br> ${mensagemFreque}`;
  }
</script>
