<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    insira a nota do atendimento: <input type="text" id="inp_nota" /> <br />
    <button onclick="calcular()">Avaliar atendimento</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  function calcular() {
    let nota = Number(inp_nota.value);
    let mensagem = ``;
    if (nota > 10 || nota < 0) {
      mensagem = `Nota inválida`;
    } else if (nota > 0 && nota < 5) {
      mensagem = `Não aprovado`;
    } else if (nota <= 6) {
      mensagem = `Neutro`;
    } else {
      mensagem = `Aprovado`;
    }
    resposta.innerHTML = `${mensagem}`
  }
</script>
