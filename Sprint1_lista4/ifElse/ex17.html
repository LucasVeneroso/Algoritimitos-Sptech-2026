<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Insira um número: <input type="text" id="inp_num"><br>
    <button onclick="analise()">Analisar</button>
    <div id="resposta"></div>
</body>
</html>
<script>
    function analise(){
        let num = Number(inp_num.value);
        if (num % 2 == 0){
            resposta.innerHTML = `<p style="color: red; background-color: yellow " >Esse número é par </p>`;
        } else {
            resposta.innerHTML = `<b><p style="color: blue;" >Esse número é impar </p></b>`;
        }
    }
</script>
