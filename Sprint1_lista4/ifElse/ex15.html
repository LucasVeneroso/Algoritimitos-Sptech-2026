<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    insira a quantidade de homens: <input type="text" id="inp_qtdHomens"><br>
    insira a quantidade de Mulheres: <input type="text" id="inp_qtdMulheres"><br>
    <button onclick="Calcular()">Ligar Elevador</button>
    <div id="resposta"></div>
</body>
</html>
<script>
    function Calcular(){
        let qtdHomens = Number(inp_qtdHomens.value);
        let qtdMulheres = Number(inp_qtdMulheres.value);
        let mediaPeso = (qtdHomens * 90) + (qtdMulheres * 70)
        if(mediaPeso <= 500){
            resposta.innerHTML = `<p style="color: green">Elevador vai se mover, pois está com ${mediaPeso}kg</p>`
        } else{
            resposta.innerHTML = `<p style="color: red"> Alguém precisa descer. Precisa perder ${mediaPeso}kg para mover o elevador`
        }
    }
</script>
