<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    insira nota 1: <input type="text" id="inp_nota1"><br>
    insira nota 2: <input type="text" id="inp_nota2"><br>
    <button onclick="Calcular()">Verificar situação</button>
    <div id="resposta"></div>
</body>
</html>
<script>
    function Calcular(){
        let nota1 = Number(inp_nota1.value);
        let nota2 = Number(inp_nota2.value);
        let media = (nota1 + nota2)/2
        if(media >= 6){
            alert('Parabéns, aprovado')
        } else if (media < 6){
            alert('Tente outra vez')
        }
    }
</script>
