<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    Peso (kg): <input id="input_peso"><br>
    Altura (metros): <input id="input_altura"><br>

    <button onclick="calcular()">Calcular IMC</button>

    <div id="resultado"></div>
  </body>
</html>
<script>
  function calcular() {
    let peso = Number(input_peso.value);
    let altura = Number(input_altura.value);

    let imc = (peso / (altura * altura) );

    if (imc < 18.5) {
      resultado.innerHTML = `IMC: ${imc} <br> Abaixo do peso`;
    } else if (imc <= 24.9) {
      resultado.innerHTML = `IMC: ${imc} <br> Peso normal`;
    } else if (imc <= 29.9) {
      resultado.innerHTML = `IMC: ${imc} <br> Acima do peso`;
    } else {
      resultado.innerHTML = `IMC: ${imc} <br> Cuidado, risco de obesidade`;
    }
  }
</script>
