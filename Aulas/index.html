<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="div_1">
        Informe a sua primeira nota: <input type="number" id="nota_1"><br><br>
        Informe a sua segunda nota: <input type="number" id="nota_2"><br><br>
        <button onclick="media()">Média</button>
    </div>
    <div id="div_2"></div>
</body>
</html>
<script>
    let nota_1 = nota_1;
    let nota_2 = nota_2;
    const sum = nota_1 + nota_2;
    function media(){
        div_2.innerHTML = 'Sua nota é: ${sum}'
    }
</script>
