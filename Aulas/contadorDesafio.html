<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button onclick="contar()">Contar até 10</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  let contador = 0;

  function contar() {
    while (contador < 10){
        contador++;
        resposta.innerHTML += `${contador}<br>`;
    }
  }
</script>
