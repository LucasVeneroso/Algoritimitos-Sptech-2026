<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    N1: <input type="number" id="input_n1">
<br><br>
    N2: <input type="number" id="input_n2">
<br><br>
    <button onclick="multiplicar()">Multiplicar</button>
    <button onclick="dividir()">Dividir</button>
    <button onclick="subtrair()">Subtrair</button>
    <button onclick="somar()">Somar</button>
    <div id="div_menssagem">
    </div>

    <!-- elemento#id.classe{conteudo}[]atributo-->>
</body>
</html>
<script>
    function somar(){
        div_menssagem.innerHTML = `O resultado da soma é  ${(Number(input_n1.value) + Number(input_n2.value))}`
    }
    function subtrair(){
        div_menssagem.innerHTML = 'O resultado da subtração é ' + (Number(input_n1.value) - Number(input_n2.value))
    }
    function multiplicar(){
        div_menssagem.innerHTML = 'O resultado da multiplicação é ' + input_n1.value * input_n2.value}
    function dividir(){
        div_menssagem.innerHTML = 'O resultado da divisão é ' + input_n1.value / input_n2.value
    }

</script>
