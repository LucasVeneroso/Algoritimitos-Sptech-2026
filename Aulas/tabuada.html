<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    insira um número para exibir a tabuada dele: <input type="text" id="inp_num"><br>
    insira até onde ir: <input type="text" id="inp_numMax"><br>
    <button onclick="tabuada()">tabuada</button>
    <div id="resposta"></div>
</body>
</html>
<script>
    function tabuada(){
        let num = Number(inp_num.value);
        let numMax = Number(inp_numMax.value);
        for (i = 0; i <= numMax; i++){
            resposta.innerHTML += `${num} X ${i} = ${num * i} <br>`
        }        
    }
</script>
