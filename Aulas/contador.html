<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
    <p>A contagem está em: <b id="b_contador">0</b></p> <button onclick="contar()">Contar</button>
    <button onclick="decrementar()">Decrementar</button>
</body>
</html>
<script>
    let contador = 0; //O navegador carrega antes do código
    function contar(){
        contador += 1
        b_contador.innerHTML = contador;
    }
    function decrementar(){
        contador -= 1
        b_contador.innerHTML = contador;
    }
</script>
