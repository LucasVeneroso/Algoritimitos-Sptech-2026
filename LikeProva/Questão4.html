<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Calculadora SPFlix</h1>

  <div>
      <p>Qualidade (720p ou 1080p ou 4K):</p>
      <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>
</html>
<script>
function exibirResultado() {
  //Descobrir qualidade
  let qualidade = ipt_qualidade.value;
  let valorQualidade = 0
  if (qualidade == '720p'){
    valorQualidade += 15
  } else if (qualidade == '1080p'){
        valorQualidade += 20
  } else if (qualidade == '4K') {
    valorQualidade += 25
  }
    div_mensagem.innerHTML = `O valor base do seu plano é R$${valorQualidade.toFixed(2)}<br>`

  //Quantidade de telas
  let numTelas = Number(ipt_qtd_telas.value)
  let numTelasExtras = Number(ipt_qtd_telas_extras.value)
  let valorTelasExtras = numTelasExtras * 12.90;
  let valorTelas = 0
  if (numTelas <= 2){
    valorTelas += 10
  } else if (numTelas <= 4){
    valorTelas += 20
  } else if (numTelas > 4){
    valorTelas += 30
  }
  let telasTotais = numTelas + numTelasExtras;
  let valorTotalTelas = valorTelas + valorTelasExtras;
  div_mensagem.innerHTML += `O valor das telas do seu plano é R$${valorTotalTelas.toFixed(2)}<br>`
  
  //Assinar o plano
  let valorTotal = valorTotalTelas + valorQualidade;
  let valorPorPessoa = 0;
  //download
  
  let download = ipt_download.value;
  let taxaDowload = 5
  let desconto = 0.1
  if (download == 'sim'){
    taxaDowload +=  (1 * telasTotais)
    div_mensagem.innerHTML += `Você optou por fazer download e por isso sua conta irá subir em ${taxaDowload}%<br>`
    valorTotal += (valorTotal * (taxaDowload /100))
    div_mensagem.innerHTML += `Valor final: R$${valorTotal.toFixed(2)}<br>`
  } else if (download = 'não'){
    div_mensagem.innerHTML += `Você optou por não fazer download e por isso sua conta será reduzida em 10%<br>`
    valorTotal -= (valorTotal * desconto)
    div_mensagem.innerHTML += `Valor final: R$${(valorTotal) .toFixed(2)}<br>`
  }

  if (numTelas > 0){
    valorPorPessoa += valorTotal / telasTotais
    div_mensagem.innerHTML += `Se quiser dividir fica R$${valorPorPessoa.toFixed(2)} para cada!<br>`
  }
}
</script>
