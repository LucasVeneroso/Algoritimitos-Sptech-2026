<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
        <button onclick="parar()">PARE</button>
        <button onclick="pensar()">PENSE</button>
        <button onclick="seguir()">SIGA</button>

    <div id="resposta">
        
    </div>
</body>
</html>
<script>
    function parar(){
        resposta.innerHTML = 'Pare e Aguarde!';
    }
    function pensar(){
       resposta.innerHTML = 'Pense se pode seguir ou se deve parar!';
    }
    function seguir(){
       resposta.innerHTML = 'Pode seguir adiante';
    }
</script>
