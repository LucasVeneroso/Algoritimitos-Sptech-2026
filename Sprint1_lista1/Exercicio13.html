<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="div_1">
    Quantidade de Exercícios realizados: <input type="number" id="num_exercicios"><br><br>
    Insira o Tempo de treino <input type="number" id="temp_treino" placeholder="(Em minutos)"><br><br>
    <button onclick="imprimir()">Encerrar a sessão</button><br><br>
    </div>
    <div id="div_2"></div>
</body>
</html>
<script>
    function imprimir(){
        div_2.innerHTML = 'Você realizou ' + num_exercicios.value + ' exercícios!<br>' +"O tempo total da sessão foi de " + temp_treino.value + " minutos."
    }
</script>
