<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        Distancia percorrida em Km: <input id="distancia" type="number"> <br>
        Tempo gasto em minutos: <input id="tempo" type="number"> <br>
        <button onclick="mostrarIformacoes()">Ver Dica</button>
    </div>
</body>
</html>
<script>
    function mostrarIformacoes(){
        alert("Você percorreu " + distancia.value +"km hoje!")
        alert("O seu tempo total de exercício foi de " + tempo.value +  " minutos.")

    }

</script>
