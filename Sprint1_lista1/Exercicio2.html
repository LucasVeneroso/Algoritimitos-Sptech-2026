<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        Insira seu peso: <input type="number" id="peso"><br>
        Insira sua altura: <input type="number" id="altura"><br>
        <button onclick=" imprimeValores()">CLIQUE EM MIM</button>
    </div>
</body>
</html>
<script>
    function imprimeValores(){
        alert('Você pesa '+ peso.value + 'kg e tem ' + altura.value + 'm de altura')
    }
</script>
