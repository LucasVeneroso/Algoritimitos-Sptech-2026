<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        Nome do Time: <input id="time" type="text"> <br>
        Quantidade de títulos: <input id="qtd_titulos" type="number"> <br>
        <button onclick="sobreMeutime()">AMO MEU TIME</button>
    </div>
</body>
</html>
<script>
    function sobreMeutime(){
        alert('O time ' + time.value + ' tem ' + qtd_titulos.value + ' titulos')
    }
</script>
