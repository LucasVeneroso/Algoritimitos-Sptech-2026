  <body>
    <select id="num_tabuada">

      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option></select
    ><br />
    insira o número até onde a tabuada vai:
    <input type="text" id="inp_num" /><br />
    <button onclick="analisar()">S2 Pares</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  let contador = 0;
  function analisar() {
    let maximo = Number(inp_num.value);
    let tabuada = Number(num_tabuada.value);
    let mensagem = "";
    while (contador < maximo) {
      contador++;
      mensagem += `${tabuada} X ${contador} = ${contador * tabuada}<br>`;
    }
    resposta.innerHTML = `${mensagem}`;
  }
</script>
