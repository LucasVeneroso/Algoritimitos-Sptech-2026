<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    insira um número <input type="text" id="inp_num"><br>
    fale uma frase <input type="text" id="inp_frase"><br>
    <button onclick="imprimir()">Papagaio</button>
    <div id="resposta"></div>
</body>
</html>
<script>
    contador = 0;
    contadorFrase = 0
    function imprimir(){
        let num = Number(inp_num.value);
        let frase = inp_frase.value;
        let mensagem = ``;
        while(contadorFrase < num){
            mensagem += `  ${frase}` 
            contadorFrase++;
        }

        while(contador < num){
            contador++;
            alert(mensagem)
        }
    }
</script>
