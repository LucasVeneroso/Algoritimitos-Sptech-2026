<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    insira um numero <input type="text" id="inp_num" /><br />
    insira uma frase <input type="text" id="inp_frase" /><br />
    <button onclick="repetir()">Papagaio Repetitivo</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  contador = 0;

  function repetir() {
    let num = Number(inp_num.value);
    let frase = inp_frase.value;
    let mensagem = frase;
    while (contador < num) {
      contador++;
      resposta.innerHTML += `${contador} - ${mensagem} <br>`;
      mensagem = mensagem + ` ` + frase;
    }
  }
</script>
