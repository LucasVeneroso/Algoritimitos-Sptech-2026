<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button onclick="contar()">Diga algo sobre a matéria de Algoritmos</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  contador = 1;
  function contar() {
    let mensagem = "";
    while (contador < 16) {
      mensagem = `${contador}`;
      contador++;
    }
    resposta.innerHTML += `${mensagem} <br>`;
  }
</script>
