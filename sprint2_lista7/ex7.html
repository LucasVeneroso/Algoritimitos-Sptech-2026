<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button onclick="analisar()">S2 Pares</button>
    <div id="resposta"></div>
  </body>
</html>
<script>
  contador = 0;
  function analisar() {
    let mensagem = "";
    while (contador < 100) {
      contador++;
      if (contador % 2 != 0) {
      } else {
        mensagem += `${contador}<br>`;
      }
    }
    resposta.innerHTML = `${mensagem}`;
  }
</script>
