<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Digite um número: <input type="number" id="num_1"><br><br>
    Digite outro número: <input type="number" id="num_2"><br><br>
    <button onclick="Somar()">soma</button>
    <button onclick="Subtrair()">Subtração</button>
    <button onclick="Multiplicar()">Multiplicação</button>
    <button onclick="Dividir()">Divisão</button><br><br>
    <div id="resultado"></div>
</body>
</html>
<script>
    
    function Somar() {
        const num1 = Number(num_1.value);
        const num2 = Number(num_2.value);
        const resultado_soma = num1 + num2;
        resultado.innerHTML = `A soma entre ${num1} e ${num2} é: ${resultado_soma}`
        console.log(num1, num2 , resultado_soma);
    }
    function Subtrair() {
        const num1 = Number(num_1.value);
        const num2 = Number(num_2.value);
    const resultado_sub = num1 - num2;

        resultado.innerHTML = `A diferença entre ${num1} e ${num2} é: ${resultado_sub}`
    }
    function Multiplicar() {
        const num1 = Number(num_1.value);
        const num2 = Number(num_2.value);
    const resultado_mult = num1 * num2;

        resultado.innerHTML = `O produto entre ${num1} e ${num2} é: ${resultado_mult}`
    }
    function Dividir() {
        const num1 = Number(num_1.value);
        const num2 = Number(num_2.value);
        const resultado_div = num1 / num2;

        resultado.innerHTML = `A razão entre ${num1} e ${num2} é: ${resultado_div}`
    }
</script>
