<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="Receber()">Receber 100</button>
    <button onclick="Pagar()">Pagar 50</button>
    <div id="resposta"></div>

</body>
</html>
<script>
    let saldo = 0;

    function Receber(){
        saldo +=100;
        resposta.innerHTML = `Transferência de R$100 recebida! Saldo atual: ${saldo}`
    }
    function Pagar(){
        saldo -= 50;
        resposta.innerHTML = `Pagamento de R$50 efetuado! ${saldo}`
    }
</script>
